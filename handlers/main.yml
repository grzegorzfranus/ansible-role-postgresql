---
# ==============================================================================
# PostgreSQL Role Service Handlers
# ==============================================================================
# Task naming format: PostgreSQL | handlers | <Imperative action>
# ==============================================================================

- name: "PostgreSQL | handlers | Restart PostgreSQL service"
  ansible.builtin.systemd:
    name: "{{ __postgresql_service_name }}"
    state: restarted
    daemon_reload: true
  become: true
  listen: "restart postgresql"

- name: "PostgreSQL | handlers | Reload PostgreSQL service"
  ansible.builtin.systemd:
    name: "{{ __postgresql_service_name }}"
    state: reloaded
  become: true
  listen: "reload postgresql"

- name: "PostgreSQL | handlers | Update apt cache"
  ansible.builtin.apt:
    update_cache: true
  become: true
  register: __postgresql_apt_post_repo_update
  retries: 3
  delay: 5
  until: __postgresql_apt_post_repo_update is succeeded
  listen: "update apt cache"
