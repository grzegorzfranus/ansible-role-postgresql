---
# ==============================================================================
# PostgreSQL Input Assertion Validation
# ==============================================================================
# Section numbering mirrors defaults/main.yml sections 1-10.
# Every assertion must specify both `fail_msg` AND `success_msg`.
# ==============================================================================

# ------------------------------------------------------------------------------
# Section 1: General Settings Assertions
# ------------------------------------------------------------------------------
- name: "PostgreSQL | assert | Validate role action option"
  ansible.builtin.assert:
    that:
      - postgresql_role_action in ['all', 'prerequisites', 'install', 'configure', 'databases', 'upgrade']
    fail_msg: "Invalid postgresql_role_action '{{ postgresql_role_action }}'. Must be one of: 'all', 'prerequisites', 'install', 'configure', 'databases', 'upgrade'."
    success_msg: "postgresql_role_action '{{ postgresql_role_action }}' is valid."

- name: "PostgreSQL | assert | Validate config change action option"
  ansible.builtin.assert:
    that:
      - postgresql_config_change_action in ['reload', 'restart']
    fail_msg: "Invalid postgresql_config_change_action '{{ postgresql_config_change_action }}'. Must be 'reload' or 'restart'."
    success_msg: "postgresql_config_change_action '{{ postgresql_config_change_action }}' is valid."

# ------------------------------------------------------------------------------
# Section 2: Installation Assertions
# ------------------------------------------------------------------------------
- name: "PostgreSQL | assert | Validate PostgreSQL major version"
  ansible.builtin.assert:
    that:
      - postgresql_version | string in __postgresql_supported_versions
    fail_msg: "Unsupported postgresql_version '{{ postgresql_version }}'. Supported versions are: {{ __postgresql_supported_versions | join(', ') }}."
    success_msg: "postgresql_version '{{ postgresql_version }}' is supported."

# ------------------------------------------------------------------------------
# Section 3: Connection Settings Assertions
# ------------------------------------------------------------------------------
- name: "PostgreSQL | assert | Validate network port range"
  ansible.builtin.assert:
    that:
      - postgresql_port | int >= 1
      - postgresql_port | int <= 65535
    fail_msg: "Invalid postgresql_port '{{ postgresql_port }}'. Must be an integer between 1 and 65535."
    success_msg: "postgresql_port {{ postgresql_port }} is within valid range."

- name: "PostgreSQL | assert | Validate max_connections positive integer"
  ansible.builtin.assert:
    that:
      - postgresql_max_connections | int >= 1
    fail_msg: "Invalid postgresql_max_connections '{{ postgresql_max_connections }}'. Must be a positive integer >= 1."
    success_msg: "postgresql_max_connections {{ postgresql_max_connections }} is valid."

# ------------------------------------------------------------------------------
# Section 5: WAL / Checkpoints Assertions
# ------------------------------------------------------------------------------
- name: "PostgreSQL | assert | Validate wal_level setting"
  ansible.builtin.assert:
    that:
      - postgresql_wal_level in ['minimal', 'replica', 'logical']
    fail_msg: "Invalid postgresql_wal_level '{{ postgresql_wal_level }}'. Must be 'minimal', 'replica', or 'logical'."
    success_msg: "postgresql_wal_level '{{ postgresql_wal_level }}' is valid."

- name: "PostgreSQL | assert | Validate checkpoint_completion_target range"
  ansible.builtin.assert:
    that:
      - postgresql_checkpoint_completion_target | float >= 0.0
      - postgresql_checkpoint_completion_target | float <= 1.0
    fail_msg: "Invalid postgresql_checkpoint_completion_target '{{ postgresql_checkpoint_completion_target }}'. Must be between 0.0 and 1.0."
    success_msg: "postgresql_checkpoint_completion_target {{ postgresql_checkpoint_completion_target }} is valid."

# ------------------------------------------------------------------------------
# Section 7: Security / Authentication Assertions
# ------------------------------------------------------------------------------
- name: "PostgreSQL | assert | Validate authentication method"
  ansible.builtin.assert:
    that:
      - postgresql_auth_method in ['scram-sha-256', 'trust', 'reject', 'md5']
    fail_msg: "Invalid postgresql_auth_method '{{ postgresql_auth_method }}'."
    success_msg: "postgresql_auth_method '{{ postgresql_auth_method }}' is valid."

- name: "PostgreSQL | assert | Validate pg_hba entries schema"
  ansible.builtin.assert:
    that:
      - item.type is defined and item.type in ['local', 'host', 'hostssl', 'hostnossl', 'hostgssenc', 'hostnogssenc']
      - item.database is defined
      - item.user is defined
      - item.auth_method is defined
    fail_msg: "Invalid pg_hba entry {{ item }}. Must define 'type', 'database', 'user', and 'auth_method'."
    success_msg: "pg_hba entry for user '{{ item.user }}' database '{{ item.database }}' is valid."
  loop: "{{ postgresql_hba_entries }}"
  loop_control:
    label: "{{ item.type | default('unknown') }}:{{ item.user | default('unknown') }}@{{ item.database | default('unknown') }}"

# ------------------------------------------------------------------------------
# Section 10: Logrotate Configuration Assertions
# ------------------------------------------------------------------------------
- name: "PostgreSQL | assert | Validate logrotate configuration settings"
  ansible.builtin.assert:
    that:
      - postgresql_logrotate_options is mapping
    fail_msg: "postgresql_logrotate_options must be a valid dictionary."
    success_msg: "Logrotate configuration settings are valid."
